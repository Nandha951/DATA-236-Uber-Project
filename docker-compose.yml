version: '3.8'

services:
  user-service:
    build: ./services/user-service
    ports:
      - "3003:3001"
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb://mongodb:27017/uber-users
      - JWT_SECRET=your_jwt_secret_key
      - PORT=3001
    depends_on:
      - mongodb
    networks:
      - uber-network

  ride-service:
    build: ./services/ride-service
    ports:
      - "3004:3002"
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb://mongodb:27017/uber-rides
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=your_jwt_secret_key
      - USER_SERVICE_URL=http://user-service:3001
      - PORT=3002
    depends_on:
      - mongodb
      - redis
      - user-service
    networks:
      - uber-network

  payment-service:
    build: ./services/payment-service
    ports:
      - "3005:3005"
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb://mongodb:27017/uber-payments
      - JWT_SECRET=your_jwt_secret_key
      - STRIPE_SECRET_KEY=your_stripe_secret_key
      - PORT=3005
    depends_on:
      - mongodb
      - user-service
    networks:
      - uber-network

  driver-service:
    build: ./services/driver-service
    ports:
      - "3006:3006"
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb://mongodb:27017/uber-drivers
      - JWT_SECRET=your_jwt_secret_key
      - AWS_ACCESS_KEY_ID=your_aws_access_key
      - AWS_SECRET_ACCESS_KEY=your_aws_secret_key
      - AWS_REGION=your_aws_region
      - PORT=3006
    depends_on:
      - mongodb
      - user-service
    networks:
      - uber-network

  mongodb:
    image: mongo:latest
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - uber-network

  redis:
    image: redis:latest
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - uber-network

volumes:
  mongodb_data:
  redis_data:

networks:
  uber-network:
    driver: bridge 