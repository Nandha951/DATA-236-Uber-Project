apiVersion: v1
kind: Service
metadata:
  name: rides-service
spec:
  selector:
    app: rides-service # Must match the labels in the Deployment
  ports:
    - protocol: TCP
      port: 80 # Port the service will be available on within the cluster
      targetPort: 3000 # Port the container is listening on (from Dockerfile EXPOSE and Deployment containerPort)
  type: ClusterIP # Use ClusterIP for internal services. Change to LoadBalancer for external access if needed. 