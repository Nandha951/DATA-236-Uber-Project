apiVersion: v1
kind: Service
metadata:
  name: admin-service
spec:
  selector:
    app: admin-service # Must match the labels in the Deployment
  ports:
    - protocol: TCP
      port: 80 # Port the service will be available on within the cluster
      targetPort: 3000 # Port the container is listening on
  type: ClusterIP # Use ClusterIP for internal services 